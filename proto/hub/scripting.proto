  int32 percent = 2;
}

// ---- US6 — Client-authored overlays ----

enum CoordinateSpace {
  COORDINATE_SPACE_UNSPECIFIED = 0;
  COORDINATE_SPACE_WORLD = 1;
  COORDINATE_SPACE_SCREEN = 2;
}

enum TextAlign {
  TEXT_ALIGN_UNSPECIFIED = 0;
  TEXT_ALIGN_LEFT = 1;
  TEXT_ALIGN_CENTER = 2;
  TEXT_ALIGN_RIGHT = 3;
}

message OverlayPoint {
  float x = 1;
  float y = 2;
}

message OverlayStyle {
  uint32 stroke_color_rgba = 1;
  float stroke_width = 2;
  bool has_fill = 3;
  uint32 fill_color_rgba = 4;
  float opacity = 5;
  repeated float dash = 6;
}

message PathVerb {
  oneof verb {
    OverlayPoint move_to = 1;
    OverlayPoint line_to = 2;
    CubicTo cubic_to = 3;
    Close close = 4;
  }
}

message CubicTo {
  OverlayPoint c1 = 1;
  OverlayPoint c2 = 2;
  OverlayPoint p = 3;
}

message Close {}

message LinePrimitive {
  OverlayPoint from = 1;
  OverlayPoint to = 2;
}

message PolylinePrimitive {
  repeated OverlayPoint points = 1;
}

message PolygonPrimitive {
  repeated OverlayPoint points = 1;
}

message RectanglePrimitive {
  float x = 1;
  float y = 2;
  float width = 3;
  float height = 4;
  float corner_radius = 5;
}

message CirclePrimitive {
  OverlayPoint center = 1;
  float radius = 2;
}

message PathPrimitive {
  repeated PathVerb verbs = 1;
}

message TextPrimitive {
  OverlayPoint anchor = 1;
  string text = 2;
  float font_size = 3;
  string font_family = 4;
  TextAlign align = 5;
}

message ImagePrimitive {
  OverlayPoint anchor = 1;
  int32 width = 2;
  int32 height = 3;
  bytes bytes = 4;
}

message OverlayPrimitive {
  CoordinateSpace space = 1;
  OverlayStyle style = 2;
  oneof primitive {
    LinePrimitive line = 3;
    PolylinePrimitive polyline = 4;
    PolygonPrimitive polygon = 5;
    RectanglePrimitive rectangle = 6;
    CirclePrimitive circle = 7;
    PathPrimitive path = 8;
    TextPrimitive text = 9;
    ImagePrimitive image = 10;
  }
}

message OverlayLayerWire {
  string name = 1;
  int32 z_hint = 2;
  repeated OverlayPrimitive primitives = 3;
}

message OverlayLayerDescriptor {
  string name = 1;
  int32 z_hint = 2;
  int64 uploaded_at_unix_ms = 3;
  int32 primitive_count = 4;
}

message PutLayerRequest {
  OverlayLayerWire layer = 1;
}
message PutLayerResponse {
  MutationResult result = 1;
  repeated string validation_errors = 2;
  string exceeded_cap = 3;
}

message DeleteLayerRequest {
  string name = 1;
}
message DeleteLayerResponse {
  MutationResult result = 1;
}

message ListLayersRequest {}
message ListLayersResponse {
  repeated OverlayLayerDescriptor layers = 1;
}

message ClearLayersRequest {}
message ClearLayersResponse {
  MutationResult result = 1;
  int32 cleared_count = 2;
}

// -----------------------------------------------------------------------------
// Feature 042 — Hub log stream. Additive only.
// -----------------------------------------------------------------------------

enum LogSeverity {
  LOG_SEVERITY_UNSPECIFIED = 0;
  LOG_SEVERITY_DEBUG       = 1;
  LOG_SEVERITY_INFO        = 2;
  LOG_SEVERITY_WARNING     = 3;
  LOG_SEVERITY_ERROR       = 4;
}

// Exhaustive enumeration of the Hub subsystems that emit on the log
// stream today (FR-004). Scope deliberately excludes engine-launcher
// infolog.txt capture, map-analysis, synthetic-data, and viz-rendering
// internals per feature 042 Clarifications Q1.
enum LogCategory {
  LOG_CATEGORY_UNSPECIFIED        = 0;
  LOG_CATEGORY_SESSION_MANAGER    = 1;
  LOG_CATEGORY_ADMIN_CHANNEL      = 2;
  LOG_CATEGORY_SCRIPTING_HUB      = 3;
  LOG_CATEGORY_PROXY_INSTALL      = 4;
  LOG_CATEGORY_HEADLESS_RENDERER  = 5;
  LOG_CATEGORY_HUB_STATE_STORE    = 6;
  LOG_CATEGORY_PRESET_PERSISTENCE = 7;
  LOG_CATEGORY_LOBBY              = 8;
  LOG_CATEGORY_SETTINGS           = 9;
}

// Client-side filter request. Sent as the first message (initial
// subscription) and on every subsequent update.
message LogFilterWire {
  // Category whitelist. Empty list = "all categories" per the default
  // filter (FR-005a). Presence of LOG_CATEGORY_UNSPECIFIED →
  // INVALID_ARGUMENT (FR-007).
  repeated LogCategory categories = 1;

  // Severity floor. LOG_SEVERITY_UNSPECIFIED = server default = INFO.
  LogSeverity min_severity = 2;

  // Optional hub-shipped preset name (e.g. "admin-channel",
  // "session-lifecycle", "scripting-wire"). Empty string = no preset.
  // When both preset_name and an explicit categories list are supplied,
  // the explicit list overrides the preset (US5 AS2).
  // Unknown preset name → INVALID_ARGUMENT.
  string preset_name = 3;
}

message StreamHubLogRequest {
  // Optional human-readable label for the connected client; surfaces in
  // Hub-side diagnostics. Ignored on filter-update messages after the
  // first request.
  string client_label = 1;

  // Effective filter. On the first message, the filter becomes the
  // subscription's active policy. On subsequent messages, it replaces
  // the policy atomically.
  LogFilterWire filter = 2;
}

message LogEntryMessage {
  // Hub-local UTC timestamp, Unix ms.
  int64 timestamp_unix_ms = 1;

  // Severity. DEBUG only reaches clients that explicitly lowered the
  // severity floor via filter (FR-005a).
  LogSeverity severity = 2;

  // Source subsystem.
  LogCategory category = 3;

  // Human-readable message. UTF-8, ≤ 8 KiB including a trailing
  // " …[truncated N bytes]" marker on messages that were truncated
  // at the Hub (FR-012a).
  string message = 4;

  // Correlation ID of the RPC that owns this entry (FR-009/009a).
  // Empty string when the entry is not tied to any RPC.
  string correlation_id = 5;

  // Session ID when the entry is about a specific RunningSession
  // (FR-010). Empty string otherwise.
  string session_id = 6;

  // Scripting-client ID when the entry is about a specific connected
  // client (FR-010). Empty string otherwise.
  string scripting_client_id = 7;

  // Per-subscriber monotonic sequence number, starting at 1.
  uint64 sequence = 8;

  // Count of entries the server dropped to this subscriber since the
  // last successful delivery (FR-012). Reset to 0 on every delivery.
  int32 dropped_since_last = 9;
}
