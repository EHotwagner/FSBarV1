// Hub Scripting Service contract for FSBar.Hub (feature 035-central-gui-hub).
//
// Regenerate with: `cd proto && buf generate`.
//
// The generator writes to src/FSBar.Proto/Generated/hub/ — that file is then
// listed in src/FSBar.Proto/FSBar.Proto.fsproj alongside the existing
// Generated/highbar/*.gen.fs entries.
//
// ---------------------------------------------------------------------------
// Spec / implementation reconciliation note (Phase 1):
// ---------------------------------------------------------------------------
//
// The spec-side draft at specs/035-central-gui-hub/contracts/hub/scripting.proto
// references `highbar.GameFrame` and `highbar.UnitDef`. The existing highbar
// proto bundle only exposes `highbar.Frame` (raw envelope: frame_number,
// events, team_id) and no UnitDef message — the F# `FSBar.Client.GameFrame`
// and `FSBar.Client.UnitDefCache` types carry rich decoded state that has no
// current wire representation.
//
// For Phase 1 we stub the missing types as hub-namespace messages so the
// file compiles end-to-end. Phase 9 (US7) MUST either:
//   a) add `GameFrame` / `UnitDef` messages to the highbar workspace (proper
//      protocol widening), or
//   b) keep them in the hub namespace and document that the hub is the
//      authoritative schema for the scripting wire format.
//
// Until then, `StreamGameFrames` yields a `GameFrameMessage` carrying the
// raw `highbar.Frame` plus hub-assigned diagnostics (sequence, enqueue ts).

syntax = "proto3";

package fsbar.hub.scripting.v1;

import "highbar/messages.proto";   // highbar.Frame
import "highbar/commands.proto";   // highbar.AICommand

// -----------------------------------------------------------------------------
// Service
// -----------------------------------------------------------------------------

service ScriptingService {
  // Server-streaming RPC. The hub pushes every frame the embedded viewer
  // sees to every connected scripting client. When no session is running,
  // the stream stays open but produces no messages until a session starts
  // (FR-030). Per-client buffering is a bounded channel of 16 with
  // drop-oldest semantics; cumulative drops > 32 trigger detach (R3).
  rpc StreamGameFrames(StreamGameFramesRequest) returns (stream GameFrameMessage);

  // Unary RPC. The client submits one command; the hub forwards it to the
  // active session's proxy command queue (FR-027). If no session is active,
  // returns NOT_FOUND.
  rpc SendCommand(SendCommandRequest) returns (SendCommandResponse);

  // Unary RPC. Returns the current session status, bundled-proxy version,
  // BAR install location, and connected-client roster.
  rpc GetSessionStatus(GetSessionStatusRequest) returns (GetSessionStatusResponse);

  // Unary RPC. Returns one UnitDef by either DefId or internal name.
  // Backed by FSBar.Client.UnitDefCache; lets scripts avoid carrying their
  // own BarData dependency (matches the v1 contract scope listed in the
  // spec's Assumptions).
  rpc GetUnitDef(GetUnitDefRequest) returns (GetUnitDefResponse);

  // Feature 039 — hub admin channel RPCs. Each returns an AdminSubmitResult
  // that echoes the resulting AdminChannelStatusInfo, so scripting clients
  // don't need to round-trip GetSessionStatus after every call.
  rpc Pause(PauseRequest) returns (PauseResponse);
  rpc Resume(ResumeRequest) returns (ResumeResponse);
  rpc SetEngineSpeed(SetEngineSpeedRequest) returns (SetEngineSpeedResponse);
  rpc ForceEndMatch(ForceEndMatchRequest) returns (ForceEndMatchResponse);
  rpc SendAdminMessage(SendAdminMessageRequest) returns (SendAdminMessageResponse);

  // ---------------------------------------------------------------------------
  // Feature 040 — gRPC parity for Hub UI and rendered viewer. Additive only.
  // ---------------------------------------------------------------------------

  // ---------------- Session orchestration (US1) ----------------

  rpc ConfigureLobby(ConfigureLobbyRequest) returns (ConfigureLobbyResponse);
  rpc ListMaps(ListMapsRequest) returns (ListMapsResponse);
  rpc ValidateLobby(ValidateLobbyRequest) returns (ValidateLobbyResponse);
  rpc LaunchSession(LaunchSessionRequest) returns (LaunchSessionResponse);
  rpc StopSession(StopSessionRequest) returns (StopSessionResponse);

  // ---------------- Rendered viewer frames (US2) ----------------

  rpc StreamRenderFrames(StreamRenderFramesRequest) returns (stream RenderFrameMessage);
  rpc GetRenderFrame(GetRenderFrameRequest) returns (GetRenderFrameResponse);

  // ---------------- Viz + camera control (US3) ----------------

  rpc SetVizConfig(SetVizConfigRequest) returns (SetVizConfigResponse);
  rpc SetVizAttribute(SetVizAttributeRequest) returns (SetVizAttributeResponse);
  rpc ToggleOverlay(ToggleOverlayRequest) returns (ToggleOverlayResponse);
  rpc SetCamera(SetCameraRequest) returns (SetCameraResponse);
  rpc SetActiveTab(SetActiveTabRequest) returns (SetActiveTabResponse);

  // ---------------- Preset + encyclopedia + settings (US4) ----------------

  rpc ListPresets(ListPresetsRequest) returns (ListPresetsResponse);
  rpc SavePreset(SavePresetRequest) returns (SavePresetResponse);
  rpc LoadPreset(LoadPresetRequest) returns (LoadPresetResponse);
  rpc DeletePreset(DeletePresetRequest) returns (DeletePresetResponse);

  rpc ListUnits(ListUnitsRequest) returns (ListUnitsResponse);
  rpc SelectUnit(SelectUnitRequest) returns (SelectUnitResponse);

  rpc GetHubSettings(GetHubSettingsRequest) returns (GetHubSettingsResponse);
  rpc SetHubSettings(SetHubSettingsRequest) returns (SetHubSettingsResponse);

  rpc InstallProxy(InstallProxyRequest) returns (InstallProxyResponse);
  rpc RefreshProxyStatus(RefreshProxyStatusRequest) returns (RefreshProxyStatusResponse);

  // ---------------- Hub-wide state sync (US5) ----------------

  rpc GetHubState(GetHubStateRequest) returns (HubStateSnapshot);
  rpc StreamHubStateEvents(StreamHubStateEventsRequest) returns (stream HubStateEvent);

  // ---------------- Client-authored overlays (US6) ----------------

  rpc PutLayer(PutLayerRequest) returns (PutLayerResponse);
  rpc DeleteLayer(DeleteLayerRequest) returns (DeleteLayerResponse);
  rpc ListLayers(ListLayersRequest) returns (ListLayersResponse);
  rpc ClearLayers(ClearLayersRequest) returns (ClearLayersResponse);

  // ---------------------------------------------------------------------------
  // Feature 046 — Fully comprehensive scripting client. Additive only.
  // ---------------------------------------------------------------------------
  //
  // State + events travel on the existing `StreamGameFrames` RPC: every
  // `GameFrameMessage` now carries `game_state` + `game_events` alongside
  // the legacy `frame` envelope. This section adds the unary map-data
  // RPCs, extends `GetUnitDef` with `UnitDefInfoExtended`, and introduces
  // `SendCommandBatch` (≤1024 commands per call, whole-batch rejection
  // above cap).

  // ---------------- Map-data unary queries (US3) ----------------

  rpc GetMapInfo(GetMapInfoRequest) returns (GetMapInfoResponse);
  rpc GetHeightmap(GetHeightmapRequest) returns (HeightmapResponse);
  rpc GetCornersHeightmap(GetCornersHeightmapRequest) returns (CornersHeightmapResponse);
  rpc GetSlopeMap(GetSlopeMapRequest) returns (SlopeMapResponse);
  rpc GetLosMap(GetLosMapRequest) returns (LosMapResponse);
  rpc GetRadarMap(GetRadarMapRequest) returns (RadarMapResponse);
  rpc GetResourceMap(GetResourceMapRequest) returns (ResourceMapResponse);
  rpc ListMetalSpots(ListMetalSpotsRequest) returns (MetalSpotsResponse);

  // ---------------- Extended unit-def (US3) ----------------
  //
  // The existing `GetUnitDef` return type is unchanged — it still returns
  // the legacy `UnitDefInfo`. `GetUnitDefExtended` returns the full
  // planning-relevant surface (build options, weapon ranges, build
  // speed, etc.) per feature-046 FR-007.
  rpc GetUnitDefExtended(GetUnitDefRequest) returns (GetUnitDefExtendedResponse);

  // ---------------- Command batch (US4) ----------------

  rpc SendCommandBatch(SendCommandBatchRequest) returns (SendCommandBatchResponse);

  // ---------------- Hub log stream (feature 042) ----------------

  // Bidirectional streaming RPC. The client sends an initial
  // StreamHubLogRequest carrying its desired filter; subsequent requests on
  // the same stream mutate the filter in-place (FR-006). The server emits
  // every matching LogEntryMessage immediately, plus one ack entry after
  // each filter update. Capped at HubSettings.MaxLogStreamSubscribers
  // (default 8, range 1–32); excess attempts receive RESOURCE_EXHAUSTED
  // (FR-015a). Unknown category/preset → INVALID_ARGUMENT (FR-007).
  rpc StreamHubLog(stream StreamHubLogRequest) returns (stream LogEntryMessage);
}

// -----------------------------------------------------------------------------
// Messages
// -----------------------------------------------------------------------------

message StreamGameFramesRequest {
  // Optional client identifier for diagnostics. If empty, hub assigns a uuid.
  string client_label = 1;

  // If true, the hub will close the stream when the current session ends
  // (instead of keeping it open and waiting for the next session).
  bool close_on_session_end = 2;
}

message GameFrameMessage {
  // The raw proxy frame envelope as seen by the embedded viewer.
  // Phase-9 note: superseded by `game_state` + `game_events` (feature
  // 046) for most consumers; kept for legacy compatibility.
  highbar.Frame frame = 1;

  // Hub-assigned monotonic sequence number for this client. Lets clients
  // detect dropped frames locally (gaps).
  uint64 client_sequence = 2;

  // Hub-side timestamp (unix millis) when the frame was enqueued for this
  // client. Useful for measuring fan-out latency.
  int64 hub_enqueued_at_unix_ms = 3;

  // Feature 046: per-tick projection of BarClient.GameState. Populated
  // whenever a session is active and the frame carries a fresh snapshot;
  // absent on the "no-session" placeholder paths.
  optional GameStateFrame game_state = 4;

  // Feature 046: typed gameplay events observed since the previous frame
  // delivered to this subscriber, in engine arrival order.
  repeated GameEventEnvelope game_events = 5;
}

message SendCommandRequest {
  highbar.AICommand command = 1;
}

message SendCommandResponse {
  // The frame number on which the hub forwarded the command, or 0 if the
  // command was queued before the next frame request. Diagnostic only.
  int32 forwarded_at_frame = 1;
}

message GetSessionStatusRequest {}

message GetSessionStatusResponse {
  enum State {
    STATE_UNSPECIFIED = 0;
    IDLE              = 1;
    STARTING          = 2;
    RUNNING           = 3;
    ENDING            = 4;
    FAILED            = 5;
  }

  State state = 1;
  string bar_data_dir = 2;
  string active_engine_version = 3;
  string bundled_proxy_version = 4;
  int32 grpc_port = 5;

  // Populated when state = RUNNING.
  optional ActiveSession active_session = 6;

  // Connected scripting clients (including this caller).
  repeated ConnectedClient clients = 7;

  // The most recent failure, populated when state = FAILED.
  optional FailureInfo failure = 8;
}

message ActiveSession {
  string session_id = 1;          // GUID
  string map_name = 2;
  string mode = 3;                // "Skirmish" | "FFA" | "Team"
  float engine_speed = 4;
  bool paused = 5;
  int64 started_at_unix_ms = 6;
  // Feature 039 — hub-level admin-channel status for the running session.
  optional AdminChannelStatusInfo admin_channel_status = 7;
}

message ConnectedClient {
  string client_id = 1;           // GUID
  string client_label = 2;
  string remote_endpoint = 3;
  int64 attached_at_unix_ms = 4;
  int32 cumulative_dropped_frames = 5;
}

message FailureInfo {
  string reason = 1;
  // First N kilobytes of the engine's infolog excerpt at failure time (FR-031).
  string infolog_excerpt = 2;
}

message GetUnitDefRequest {
  oneof selector {
    int32 def_id = 1;
    string internal_name = 2;
  }
}

// UnitDef projection for the scripting wire format. Phase-9 note: may be
// superseded by a canonical highbar.UnitDef message; kept in hub namespace
// until that reconciliation happens.
message UnitDefInfo {
  int32 def_id = 1;
  string internal_name = 2;
  string display_name = 3;
  int32 metal_cost = 4;
  int32 energy_cost = 5;
  int32 build_time = 6;
  int32 max_health = 7;
}

message GetUnitDefResponse {
  optional UnitDefInfo unit_def = 1;
}

// -----------------------------------------------------------------------------
// Feature 039 — hub admin channel
// -----------------------------------------------------------------------------

// Hub-visible admin-channel status. Mirrors
// FSBar.Hub.AdminChannelHost.AdminChannelStatus.
message AdminChannelStatusInfo {
  enum State {
    STATE_UNSPECIFIED = 0;
    ATTACHED = 1;
    UNAVAILABLE = 2;
    LOST = 3;
  }

  State state = 1;
  // Populated when state = UNAVAILABLE or LOST. Empty otherwise.
  string reason = 2;
}

// Common shape for every admin-command response. Matches the three
// FSBar.Hub.AdminChannelHost.SubmitOutcome cases.
message AdminSubmitResult {
  enum Outcome {
    OUTCOME_UNSPECIFIED = 0;
    SENT = 1;
    COALESCED = 2;
    REJECTED = 3;
  }

  Outcome outcome = 1;
  int32 dropped_count = 2;
  string reason = 3;
  AdminChannelStatusInfo admin_channel_status = 4;
}

message PauseRequest {}
message PauseResponse { AdminSubmitResult result = 1; }

message ResumeRequest {}
message ResumeResponse { AdminSubmitResult result = 1; }

message SetEngineSpeedRequest {
  // Multiplier relative to 1.0x engine-native speed. Must be finite and
  // positive; Hub-local validation rejects non-positive values.
  float speed = 1;
}
message SetEngineSpeedResponse { AdminSubmitResult result = 1; }

message ForceEndMatchRequest {}
message ForceEndMatchResponse { AdminSubmitResult result = 1; }

message SendAdminMessageRequest {
  // Free-form UTF-8. Empty strings are rejected locally.
  string text = 1;
}
message SendAdminMessageResponse { AdminSubmitResult result = 1; }

// -----------------------------------------------------------------------------
// Feature 040 — gRPC parity for Hub UI and rendered viewer. Additive only.
// -----------------------------------------------------------------------------

// ---- Common helper messages ----

enum HubTab {
  HUB_TAB_UNSPECIFIED = 0;
  HUB_TAB_SETUP = 1;
  HUB_TAB_VIEWER = 2;
  HUB_TAB_UNITS = 3;
  HUB_TAB_STYLE = 4;
  HUB_TAB_CFG = 5;
  HUB_TAB_GRPC = 6;
}

enum ImageFormat {
  IMAGE_FORMAT_UNSPECIFIED = 0;
  IMAGE_FORMAT_PNG = 1;
  IMAGE_FORMAT_JPEG = 2;
}

enum SubmitOutcome {
  SUBMIT_OUTCOME_UNSPECIFIED = 0;
  SUBMIT_OUTCOME_SENT = 1;
  SUBMIT_OUTCOME_COALESCED = 2;
  SUBMIT_OUTCOME_REJECTED = 3;
}

// Reused by every mutating RPC that doesn't need a richer response.
message MutationResult {
  SubmitOutcome outcome = 1;
  // Populated when outcome = REJECTED.
  string reason = 2;
}

// ---- US1 — Session orchestration ----

message ConfigureLobbyRequest {
  LobbyConfigWire lobby = 1;
}

message ConfigureLobbyResponse {
  MutationResult result = 1;
  repeated string validation_errors = 2;
}

message LobbyConfigWire {
  string map_name = 1;
  LobbyMode mode = 2;
  float engine_speed = 3;
  bool launch_graphical_viewer = 4;
  repeated TeamWire teams = 5;
  repeated SpectatorWire spectators = 6;
}

enum LobbyMode {
  LOBBY_MODE_UNSPECIFIED = 0;
  LOBBY_MODE_SKIRMISH = 1;
  LOBBY_MODE_FFA = 2;
  LOBBY_MODE_TEAM = 3;
}

message TeamWire {
  int32 ally_team_id = 1;
  repeated SeatWire seats = 2;
}

message SeatWire {
  SeatKind kind = 1;
  string side = 2;
  float handicap = 3;
  string ai_name = 4;
  string human_name = 5;
}

enum SeatKind {
  SEAT_KIND_UNSPECIFIED = 0;
  SEAT_KIND_AI = 1;
  SEAT_KIND_HUMAN = 2;
}

message SpectatorWire {
  string name = 1;
}

message ListMapsRequest {}

message ListMapsResponse {
  repeated MapDescriptor maps = 1;
}

message MapDescriptor {
  string name = 1;
  string file_path = 2;
}

message ValidateLobbyRequest {
  LobbyConfigWire lobby = 1;
}

message ValidateLobbyResponse {
  repeated string errors = 1;
}

message LaunchSessionRequest {
  bool start_paused = 1;
  bool launch_graphical_viewer = 2;
}

message LaunchSessionResponse {
  MutationResult result = 1;
  optional string session_id = 2;
}

message StopSessionRequest {}

message StopSessionResponse {
  MutationResult result = 1;
}

// ---- US2 — Rendered viewer frames ----

message StreamRenderFramesRequest {
  string client_label = 1;
  int32 target_hz = 2;
  ImageFormat format = 3;
  int32 viewport_width = 4;
  int32 viewport_height = 5;
  int32 jpeg_quality = 6;
  bool close_on_session_end = 7;
  bool emit_no_session_placeholder = 8;
}

message RenderFrameMessage {
  bytes image_bytes = 1;
  ImageFormat format = 2;
  int64 rendered_at_unix_ms = 3;
  int64 encoded_at_unix_ms = 4;
  uint64 client_sequence = 5;
  int32 viewport_width = 6;
  int32 viewport_height = 7;
  int32 quality = 8;
  bool is_placeholder = 9;
}

message GetRenderFrameRequest {
  ImageFormat format = 1;
  int32 viewport_width = 2;
  int32 viewport_height = 3;
  int32 jpeg_quality = 4;
}

message GetRenderFrameResponse {
  RenderFrameMessage frame = 1;
}

// ---- US3 — Viz + camera control ----

message VizAttributeValue {
  oneof value {
    bool bool_value = 1;
    int32 int_value = 2;
    double float_value = 3;
    string string_value = 4;
    uint32 color_rgba = 5;
    StringList string_list_value = 6;
  }
}

message StringList {
  repeated string values = 1;
}

message VizConfigWire {
  map<string, VizAttributeValue> attributes = 1;
}

message SetVizConfigRequest {
  VizConfigWire viz_config = 1;
}

message SetVizConfigResponse {
  MutationResult result = 1;
  repeated string unknown_keys = 2;
  repeated string invalid_values = 3;
}

message SetVizAttributeRequest {
  string key = 1;
  VizAttributeValue value = 2;
}

message SetVizAttributeResponse {
  MutationResult result = 1;
}

message ToggleOverlayRequest {
  OverlayKey overlay = 1;
  OverlayTargetState target = 2;
}

enum OverlayKey {
  OVERLAY_KEY_UNSPECIFIED = 0;
  OVERLAY_KEY_UNITS = 1;
  OVERLAY_KEY_EVENTS = 2;
  OVERLAY_KEY_GRID = 3;
  OVERLAY_KEY_METAL_SPOTS = 4;
  OVERLAY_KEY_ECONOMY_HUD = 5;
  OVERLAY_KEY_WEAPON_RANGES = 6;
  OVERLAY_KEY_SIGHT_RANGES = 7;
  OVERLAY_KEY_COMMAND_QUEUE = 8;
  OVERLAY_KEY_FULL_NAMES = 9;
}

enum OverlayTargetState {
  OVERLAY_TARGET_STATE_UNSPECIFIED = 0;
  OVERLAY_TARGET_STATE_TOGGLE = 1;
  OVERLAY_TARGET_STATE_ON = 2;
  OVERLAY_TARGET_STATE_OFF = 3;
}

message ToggleOverlayResponse {
  MutationResult result = 1;
  bool new_state = 2;
}

message SetCameraRequest {
  ViewerCameraWire camera = 1;
}

message ViewerCameraWire {
  float scale = 1;
  float origin_x = 2;
  float origin_y = 3;
  bool auto_fit = 4;
}

message SetCameraResponse {
  MutationResult result = 1;
}

message SetActiveTabRequest {
  HubTab tab = 1;
}

message SetActiveTabResponse {
  MutationResult result = 1;
}

// ---- US4 — Preset / encyclopedia / settings / proxy ----

message ListPresetsRequest {}
message ListPresetsResponse {
  repeated PresetDescriptor presets = 1;
}

message PresetDescriptor {
  string name = 1;
  int64 modified_at_unix_ms = 2;
}

message SavePresetRequest {
  string name = 1;
  VizConfigWire viz_config = 2;
}
message SavePresetResponse {
  MutationResult result = 1;
}

message LoadPresetRequest {
  string name = 1;
}
message LoadPresetResponse {
  MutationResult result = 1;
  optional VizConfigWire viz_config = 2;
}

message DeletePresetRequest {
  string name = 1;
}
message DeletePresetResponse {
  MutationResult result = 1;
}

message ListUnitsRequest {
  repeated string faction_filter = 1;
}

message ListUnitsResponse {
  repeated EncyclopediaEntryWire entries = 1;
}

message EncyclopediaEntryWire {
  int32 def_id = 1;
  string internal_name = 2;
  string subfolder = 3;
  string faction = 4;
  string tier = 5;
  string shape = 6;
  int32 metal_cost = 7;
  int32 energy_cost = 8;
  int32 build_time = 9;
  int32 max_health = 10;
  int32 footprint_x = 11;
  int32 footprint_z = 12;
  float sight_range_elmo = 13;
  repeated float weapon_ranges_elmo = 14;
}

message SelectUnitRequest {
  oneof selector {
    int32 def_id = 1;
    string internal_name = 2;
  }
}

message SelectUnitResponse {
  MutationResult result = 1;
  optional EncyclopediaEntryWire entry = 2;
}

message GetHubSettingsRequest {}

message GetHubSettingsResponse {
  HubSettingsWire settings = 1;
}

message HubSettingsWire {
  string bar_data_dir_override = 1;
  string engine_version_override = 2;
  int32 grpc_port = 3;
  bool launch_graphical_viewer_default = 4;
  bool start_paused_default = 5;
  int32 max_render_frame_subscribers = 6;
  int32 schema_version = 7;
}

message SetHubSettingsRequest {
  HubSettingsWire settings = 1;
}

message SetHubSettingsResponse {
  MutationResult result = 1;
}

message InstallProxyRequest {
  bool force_reinstall = 1;
}
message InstallProxyResponse {
  MutationResult result = 1;
  optional string installed_version = 2;
}

message RefreshProxyStatusRequest {}
message RefreshProxyStatusResponse {
  string installed_version = 1;
  string install_path = 2;
  string health = 3;
}

// ---- US5 — Hub-wide state sync ----

message GetHubStateRequest {}

message HubStateSnapshot {
  HubTab active_tab = 1;
  VizConfigWire viz_config = 2;
  ViewerCameraWire camera = 3;
  LobbyConfigWire lobby = 4;
  EncyclopediaSelectionWire encyclopedia = 5;
  repeated PresetDescriptor presets = 6;
  GetSessionStatusResponse session_status = 7;
  HubSettingsWire hub_settings = 8;
}

message EncyclopediaSelectionWire {
  repeated string faction_filter = 1;
  optional int32 selected_def_id = 2;
}

message StreamHubStateEventsRequest {
  string client_label = 1;
}

message HubStateEvent {
  oneof change {
    HubTab active_tab = 1;
    VizConfigWire viz_config = 2;
    VizAttributeChange viz_attribute = 3;
    ViewerCameraWire camera = 4;
    LobbyConfigWire lobby = 5;
    EncyclopediaSelectionWire encyclopedia = 6;
    PresetChange preset = 7;
    GetSessionStatusResponse session_status = 8;
    AdminChannelStatusInfo admin_channel_status = 9;
    HubSettingsWire hub_settings = 10;
    ProxyInstallProgress proxy_install_progress = 11;
  }
  int64 emitted_at_unix_ms = 12;
  string source = 13;
}

message VizAttributeChange {
  string key = 1;
  VizAttributeValue old_value = 2;
  VizAttributeValue new_value = 3;
}

message PresetChange {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_SAVED = 1;
    KIND_DELETED = 2;
    KIND_LOADED = 3;
  }
  Kind kind = 1;
  string name = 2;
}

message ProxyInstallProgress {
  string stage = 1;
  int32 percent = 2;
}

// ---- US6 — Client-authored overlays ----

enum CoordinateSpace {
  COORDINATE_SPACE_UNSPECIFIED = 0;
  COORDINATE_SPACE_WORLD = 1;
  COORDINATE_SPACE_SCREEN = 2;
}

enum TextAlign {
  TEXT_ALIGN_UNSPECIFIED = 0;
  TEXT_ALIGN_LEFT = 1;
  TEXT_ALIGN_CENTER = 2;
  TEXT_ALIGN_RIGHT = 3;
}

message OverlayPoint {
  float x = 1;
  float y = 2;
}

message OverlayStyle {
  uint32 stroke_color_rgba = 1;
  float stroke_width = 2;
  bool has_fill = 3;
  uint32 fill_color_rgba = 4;
  float opacity = 5;
  repeated float dash = 6;
}

message PathVerb {
  oneof verb {
    OverlayPoint move_to = 1;
    OverlayPoint line_to = 2;
    CubicTo cubic_to = 3;
    Close close = 4;
  }
}

message CubicTo {
  OverlayPoint c1 = 1;
  OverlayPoint c2 = 2;
  OverlayPoint p = 3;
}

message Close {}

message LinePrimitive {
  OverlayPoint from = 1;
  OverlayPoint to = 2;
}

message PolylinePrimitive {
  repeated OverlayPoint points = 1;
}

message PolygonPrimitive {
  repeated OverlayPoint points = 1;
}

message RectanglePrimitive {
  float x = 1;
  float y = 2;
  float width = 3;
  float height = 4;
  float corner_radius = 5;
}

message CirclePrimitive {
  OverlayPoint center = 1;
  float radius = 2;
}

message PathPrimitive {
  repeated PathVerb verbs = 1;
}

message TextPrimitive {
  OverlayPoint anchor = 1;
  string text = 2;
  float font_size = 3;
  string font_family = 4;
  TextAlign align = 5;
}

message ImagePrimitive {
  OverlayPoint anchor = 1;
  int32 width = 2;
  int32 height = 3;
  bytes bytes = 4;
}

message OverlayPrimitive {
  CoordinateSpace space = 1;
  OverlayStyle style = 2;
  oneof primitive {
    LinePrimitive line = 3;
    PolylinePrimitive polyline = 4;
    PolygonPrimitive polygon = 5;
    RectanglePrimitive rectangle = 6;
    CirclePrimitive circle = 7;
    PathPrimitive path = 8;
    TextPrimitive text = 9;
    ImagePrimitive image = 10;
  }
}

message OverlayLayerWire {
  string name = 1;
  int32 z_hint = 2;
  repeated OverlayPrimitive primitives = 3;
}

message OverlayLayerDescriptor {
  string name = 1;
  int32 z_hint = 2;
  int64 uploaded_at_unix_ms = 3;
  int32 primitive_count = 4;
}

message PutLayerRequest {
  OverlayLayerWire layer = 1;
}
message PutLayerResponse {
  MutationResult result = 1;
  repeated string validation_errors = 2;
  string exceeded_cap = 3;
}

message DeleteLayerRequest {
  string name = 1;
}
message DeleteLayerResponse {
  MutationResult result = 1;
}

message ListLayersRequest {}
message ListLayersResponse {
  repeated OverlayLayerDescriptor layers = 1;
}

message ClearLayersRequest {}
message ClearLayersResponse {
  MutationResult result = 1;
  int32 cleared_count = 2;
}

// -----------------------------------------------------------------------------
// Feature 042 — Hub log stream. Additive only.
// -----------------------------------------------------------------------------

enum LogSeverity {
  LOG_SEVERITY_UNSPECIFIED = 0;
  LOG_SEVERITY_DEBUG       = 1;
  LOG_SEVERITY_INFO        = 2;
  LOG_SEVERITY_WARNING     = 3;
  LOG_SEVERITY_ERROR       = 4;
}

// Exhaustive enumeration of the Hub subsystems that emit on the log
// stream today (FR-004). Scope deliberately excludes engine-launcher
// infolog.txt capture, map-analysis, synthetic-data, and viz-rendering
// internals per feature 042 Clarifications Q1.
enum LogCategory {
  LOG_CATEGORY_UNSPECIFIED        = 0;
  LOG_CATEGORY_SESSION_MANAGER    = 1;
  LOG_CATEGORY_ADMIN_CHANNEL      = 2;
  LOG_CATEGORY_SCRIPTING_HUB      = 3;
  LOG_CATEGORY_PROXY_INSTALL      = 4;
  LOG_CATEGORY_HEADLESS_RENDERER  = 5;
  LOG_CATEGORY_HUB_STATE_STORE    = 6;
  LOG_CATEGORY_PRESET_PERSISTENCE = 7;
  LOG_CATEGORY_LOBBY              = 8;
  LOG_CATEGORY_SETTINGS           = 9;
}

// Client-side filter request. Sent as the first message (initial
// subscription) and on every subsequent update.
message LogFilterWire {
  // Category whitelist. Empty list = "all categories" per the default
  // filter (FR-005a). Presence of LOG_CATEGORY_UNSPECIFIED →
  // INVALID_ARGUMENT (FR-007).
  repeated LogCategory categories = 1;

  // Severity floor. LOG_SEVERITY_UNSPECIFIED = server default = INFO.
  LogSeverity min_severity = 2;

  // Optional hub-shipped preset name (e.g. "admin-channel",
  // "session-lifecycle", "scripting-wire"). Empty string = no preset.
  // When both preset_name and an explicit categories list are supplied,
  // the explicit list overrides the preset (US5 AS2).
  // Unknown preset name → INVALID_ARGUMENT.
  string preset_name = 3;
}

message StreamHubLogRequest {
  // Optional human-readable label for the connected client; surfaces in
  // Hub-side diagnostics. Ignored on filter-update messages after the
  // first request.
  string client_label = 1;

  // Effective filter. On the first message, the filter becomes the
  // subscription's active policy. On subsequent messages, it replaces
  // the policy atomically.
  LogFilterWire filter = 2;
}

message LogEntryMessage {
  // Hub-local UTC timestamp, Unix ms.
  int64 timestamp_unix_ms = 1;

  // Severity. DEBUG only reaches clients that explicitly lowered the
  // severity floor via filter (FR-005a).
  LogSeverity severity = 2;

  // Source subsystem.
  LogCategory category = 3;

  // Human-readable message. UTF-8, ≤ 8 KiB including a trailing
  // " …[truncated N bytes]" marker on messages that were truncated
  // at the Hub (FR-012a).
  string message = 4;

  // Correlation ID of the RPC that owns this entry (FR-009/009a).
  // Empty string when the entry is not tied to any RPC.
  string correlation_id = 5;

  // Session ID when the entry is about a specific RunningSession
  // (FR-010). Empty string otherwise.
  string session_id = 6;

  // Scripting-client ID when the entry is about a specific connected
  // client (FR-010). Empty string otherwise.
  string scripting_client_id = 7;

  // Per-subscriber monotonic sequence number, starting at 1.
  uint64 sequence = 8;

  // Count of entries the server dropped to this subscriber since the
  // last successful delivery (FR-012). Reset to 0 on every delivery.
  int32 dropped_since_last = 9;
}

// -----------------------------------------------------------------------------
// Feature 046 — Fully comprehensive scripting client. Additive only.
//
// Design notes (see specs/046-scripting-full-client/):
//   * Per-tick state is a projection of FSBar.Client.BarClient.GameState
//     (feature 045 is the single source of truth). No new engine RPCs.
//   * Enemy health uses oneof{health_info} so "unknown" (radar-only /
//     frozen last-known) is distinguishable from "health = 0" (dying).
//   * Grid responses are repeated float / repeated int32 + width/height;
//     the Hub scripting channel's MaxReceiveMessageSize /
//     MaxSendMessageSize are raised to fit worst-case SupportedMap grids.
//   * SendCommandBatch is capped at 1024; oversize batches are rejected
//     whole with a diagnostic naming the cap and received size.
// -----------------------------------------------------------------------------

// ---------- Per-tick game-state projection (US1) ----------

message Vec3Wire {
  float x = 1;
  float y = 2;
  float z = 3;
}

message EconomySnapshotWire {
  float metal_current = 1;
  float metal_income  = 2;
  float metal_usage   = 3;
  float metal_storage = 4;
  float energy_current = 5;
  float energy_income  = 6;
  float energy_usage   = 7;
  float energy_storage = 8;
}

// Explicit "unknown health" marker on EnemyUnitState.health_info.
// Distinct from health = 0 (a dying unit).
message EnemyHealthUnknown {}

message FriendlyUnitState {
  int32 unit_id = 1;
  int32 def_id = 2;
  Vec3Wire position = 3;
  float health = 4;
  float max_health = 5;
  bool finished = 6;
  bool idle = 7;
}

message EnemyUnitState {
  int32 unit_id = 1;
  // Absent iff the engine has not disclosed the def (radar-only of
  // unknown class).
  optional int32 def_id = 2;
  // Last-known position — frozen when the enemy dropped from both LOS
  // and radar this tick.
  Vec3Wire position = 3;
  // FR-003 totality: exactly one arm is always set. `unknown` indicates
  // radar-only or frozen-last-known. `health = 0` is a legitimate
  // "visible but dying" reading.
  oneof health_info {
    float health = 4;
    EnemyHealthUnknown unknown = 5;
  }
  bool in_los = 6;
  bool in_radar = 7;
}

message GameStateFrame {
  uint32 frame_number = 1;
  int32 team_id = 2;
  repeated FriendlyUnitState friendlies = 3;
  repeated EnemyUnitState enemies = 4;
  EconomySnapshotWire economy = 5;
}

// ---------- Typed game events (US2) ----------

message GameEventInit {
  int32 team_id = 1;
}

message GameEventUnitCreated {
  int32 unit_id = 1;
  int32 def_id = 2;
  // 0 if no builder (e.g., commander).
  int32 builder_unit_id = 3;
}

message GameEventUnitFinished {
  int32 unit_id = 1;
  int32 def_id = 2;
}

message GameEventUnitIdle {
  int32 unit_id = 1;
}

message GameEventUnitDestroyed {
  int32 unit_id = 1;
  int32 attacker_unit_id = 2;
}

message GameEventUnitGiven {
  int32 unit_id = 1;
  int32 old_team_id = 2;
  int32 new_team_id = 3;
}

message GameEventUnitCaptured {
  int32 unit_id = 1;
  int32 old_team_id = 2;
  int32 new_team_id = 3;
}

message GameEventEnemyEnterLos {
  int32 enemy_id = 1;
}

message GameEventEnemyLeaveLos {
  int32 enemy_id = 1;
}

message GameEventEnemyEnterRadar {
  int32 enemy_id = 1;
}

message GameEventEnemyLeaveRadar {
  int32 enemy_id = 1;
}

message GameEventEnemyDestroyed {
  int32 enemy_id = 1;
  int32 attacker_unit_id = 2;
}

message GameEventEnemyCreated {
  int32 enemy_id = 1;
  int32 def_id = 2;
}

message GameEventEnemyFinished {
  int32 enemy_id = 1;
  int32 def_id = 2;
}

message GameEventUpdate {
  uint32 frame = 1;
}

message GameEventShutdown {}

message GameEventEnvelope {
  oneof payload {
    GameEventInit              init = 1;
    GameEventUnitCreated       unit_created = 2;
    GameEventUnitFinished      unit_finished = 3;
    GameEventUnitIdle          unit_idle = 4;
    GameEventUnitDestroyed     unit_destroyed = 5;
    GameEventUnitGiven         unit_given = 6;
    GameEventUnitCaptured      unit_captured = 7;
    GameEventEnemyEnterLos     enemy_enter_los = 8;
    GameEventEnemyLeaveLos     enemy_leave_los = 9;
    GameEventEnemyEnterRadar   enemy_enter_radar = 10;
    GameEventEnemyLeaveRadar   enemy_leave_radar = 11;
    GameEventEnemyDestroyed    enemy_destroyed = 12;
    GameEventEnemyCreated      enemy_created = 13;
    GameEventEnemyFinished     enemy_finished = 14;
    GameEventUpdate            update = 15;
    GameEventShutdown          shutdown = 16;
  }
}

// ---------- Map-data queries (US3) ----------

message GetMapInfoRequest {}

message GetMapInfoResponse {
  // Width/height in heightmap squares (matches Callbacks.getMapWidth /
  // getMapHeight). World size = width * 8, height * 8 elmos.
  int32 width = 1;
  int32 height = 2;
  // Active map's internal name (best-effort; empty when no session).
  string map_name = 3;
  // BAR data directory for the running engine.
  string data_dir = 4;
}

message GetHeightmapRequest {}

message HeightmapResponse {
  int32 width = 1;
  int32 height = 2;
  // Row-major, length = width * height.
  repeated float heights = 3;
}

message GetCornersHeightmapRequest {}

message CornersHeightmapResponse {
  // Width + 1 by Height + 1 vertex resolution.
  int32 width = 1;
  int32 height = 2;
  repeated float heights = 3;
}

message GetSlopeMapRequest {}

message SlopeMapResponse {
  // Half heightmap resolution.
  int32 width = 1;
  int32 height = 2;
  repeated float slopes = 3;
}

message GetLosMapRequest {}

message LosMapResponse {
  int32 width = 1;
  int32 height = 2;
  repeated int32 values = 3;
}

message GetRadarMapRequest {}

message RadarMapResponse {
  int32 width = 1;
  int32 height = 2;
  repeated int32 values = 3;
}

message GetResourceMapRequest {}

message ResourceMapResponse {
  int32 width = 1;
  int32 height = 2;
  // Engine reports integer intensities; widened to int32 to match the
  // Callbacks.getResourceMap return type.
  repeated int32 values = 3;
}

message ListMetalSpotsRequest {}

message MetalSpot {
  float x = 1;
  float y = 2;
  float z = 3;
  float metal_value = 4;
}

message MetalSpotsResponse {
  repeated MetalSpot spots = 1;
}

// ---------- Extended unit def (US3) ----------

message CostWire {
  float metal = 1;
  float energy = 2;
}

message UnitDefInfoExtended {
  int32 def_id = 1;
  string internal_name = 2;
  string display_name = 3;
  string faction = 4;
  CostWire cost = 5;
  float build_time = 6;
  float build_speed = 7;
  float sight_range_elmo = 8;
  // 0 for units without weapons.
  float max_weapon_range = 9;
  int32 footprint_x = 10;
  int32 footprint_z = 11;
  // Def ids this unit can build. Empty for non-builders.
  repeated int32 build_options = 12;
  int32 max_health = 13;
  // All weapon ranges in elmos (mirrors EncyclopediaEntryWire).
  repeated float weapon_ranges_elmo = 14;
}

message GetUnitDefExtendedResponse {
  optional UnitDefInfoExtended unit_def = 1;
}

// ---------- Command batch (US4) ----------

message SendCommandBatchRequest {
  // ≤1024 commands; above cap → whole-batch rejection (FR-008).
  repeated highbar.AICommand commands = 1;
}

message CommandOutcome {
  // Zero-based index into SendCommandBatchRequest.commands.
  int32 index = 1;
  bool accepted = 2;
  // Empty when accepted; human-readable reason when rejected.
  string diagnostic = 3;
}

message SendCommandBatchResponse {
  // Engine frame at which the accepted commands were forwarded. 0 when
  // the whole batch was rejected (oversize, no session, etc.).
  int32 forwarded_at_frame = 1;
  // 1:1 with request.commands when the batch was accepted at the
  // size-cap gate. Empty when the whole batch was rejected.
  repeated CommandOutcome outcomes = 2;
  // Populated when the whole batch was rejected (e.g., oversize,
  // no-session). Names the cap and received size when applicable.
  string batch_diagnostic = 3;
}
